logo_url: ../logo.svg

backend:
  name: github
  repo: vitalyn737/astro-starter
  branch: main
  # IMPORTANT: leave out base_url/auth_endpoint/site_domain to use manual GitHub PAT login.

media_folder: "src/assets/images"
public_folder: "@assets/images"

i18n:
  structure: "multiple_folders"
  locales:
    - "en"
    - "it"
  default_locale: "en"

collections:
  - name: "posts"
    i18n: true
    label: "Blog Posts"
    folder: "src/content/blog"
    media_folder: "/src/assets/images/blog"
    public_folder: "@assets/images/blog"
    create: true
    delete: true
    fields:
      - name: "title"
        widget: "string"
        label: "Post Title"
        i18n: true
      - label: "Description"
        name: "description"
        widget: "string"
        i18n: true
      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm"
        i18n: "duplicate"
      - label: "Image"
        name: "heroImage"
        widget: "image"
        i18n: "duplicate"
      - name: "body"
        widget: "markdown"
        label: "Post Body"
        i18n: true
